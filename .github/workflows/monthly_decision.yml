name: Monthly Decision Report

# Fires on the 20th, 21st, and 22nd of each month.
# The script itself is idempotent: it skips if a report for this month
# already exists.  This handles the "first business day on or after the 20th"
# requirement without needing a custom weekend-aware cron expression.
#
# Schedule logic:
#   - 20th fires first (primary target date).
#   - If the 20th is a Saturday, the 21st run produces the report (Sunday → skip,
#     Monday → 22nd fires).
#   - If the 20th is a Sunday, the 21st (Monday) run produces the report.
#   - Once the report exists, the 21st and 22nd runs are no-ops (idempotent).
#
# All runs are at 15:00 UTC = 11 AM ET (after morning data settlement).

on:
  schedule:
    - cron: '0 15 20 * *'   # 20th of each month at 15:00 UTC
    - cron: '0 15 21 * *'   # 21st (fallback if 20th was Saturday)
    - cron: '0 15 22 * *'   # 22nd (fallback if 20th was Sunday)
  workflow_dispatch:
    inputs:
      as_of_date:
        description: 'Override as-of date (YYYY-MM-DD). Defaults to today.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (generate outputs, skip git commit)'
        type: boolean
        default: false
      skip_fred:
        description: 'Skip FRED data fetch (use cached data)'
        type: boolean
        default: false

concurrency:
  group: monthly-decision-report
  cancel-in-progress: false

jobs:
  monthly-decision:
    name: Generate monthly PGR decision report
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for git push back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly decision script
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          AS_OF_FLAG=""
          if [ -n "${{ github.event.inputs.as_of_date }}" ]; then
            AS_OF_FLAG="--as-of ${{ github.event.inputs.as_of_date }}"
          fi

          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          FRED_FLAG=""
          if [ "${{ github.event.inputs.skip_fred }}" = "true" ]; then
            FRED_FLAG="--skip-fred"
          fi

          python scripts/monthly_decision.py $AS_OF_FLAG $DRY_FLAG $FRED_FLAG

      - name: Verify monthly artifacts and write summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python scripts/verify_monthly_outputs.py --summary-path workflow_summary.md
          cat workflow_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit results
        # Skip commit on dry-run; only commit if there are changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/monthly_decisions/
          git add data/pgr_financials.db
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m \
            "feat: monthly decision report $(date -u +%Y-%m) [skip ci]"
          git push

      - name: Send monthly decision email
        # Send after a successful (non-dry-run) report.  Failure is non-fatal —
        # data collection and DB commit are more critical than the notification.
        # Email logic lives in src/reporting/email_sender.py (testable module).
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        env:
          SMTP_SERVER:   ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.PREDICTION_EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.PREDICTION_EMAIL_TO }}
        run: |
          python - <<'PYEOF'
          import sys
          from pathlib import Path
          from datetime import datetime, timezone

          sys.path.insert(0, str(Path(__file__).parent.parent))
          from src.reporting.email_sender import send_monthly_email

          try:
              subject = send_monthly_email()
              print(f"[email] Sent: {subject}")
          except FileNotFoundError as exc:
              print(f"[email] Report not found — skipping: {exc}")
              sys.exit(0)
          except ValueError as exc:
              print(f"[email] Missing SMTP config — skipping: {exc}")
              sys.exit(0)
          except RuntimeError as exc:
              print(f"[email] WARNING: Send failed: {exc}")
              sys.exit(1)
          PYEOF
