name: Monthly Decision Report

# Fires on the 20th, 21st, and 22nd of each month.
# The script itself is idempotent: it skips if a report for this month
# already exists.  This handles the "first business day on or after the 20th"
# requirement without needing a custom weekend-aware cron expression.
#
# Schedule logic:
#   - 20th fires first (primary target date).
#   - If the 20th is a Saturday, the 21st run produces the report (Sunday → skip,
#     Monday → 22nd fires).
#   - If the 20th is a Sunday, the 21st (Monday) run produces the report.
#   - Once the report exists, the 21st and 22nd runs are no-ops (idempotent).
#
# All runs are at 15:00 UTC = 11 AM ET (after morning data settlement).

on:
  schedule:
    - cron: '0 15 20 * *'   # 20th of each month at 15:00 UTC
    - cron: '0 15 21 * *'   # 21st (fallback if 20th was Saturday)
    - cron: '0 15 22 * *'   # 22nd (fallback if 20th was Sunday)
  workflow_dispatch:
    inputs:
      as_of_date:
        description: 'Override as-of date (YYYY-MM-DD). Defaults to today.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (generate outputs, skip git commit)'
        type: boolean
        default: false
      skip_fred:
        description: 'Skip FRED data fetch (use cached data)'
        type: boolean
        default: false

jobs:
  monthly-decision:
    name: Generate monthly PGR decision report
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for git push back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly decision script
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          AS_OF_FLAG=""
          if [ -n "${{ github.event.inputs.as_of_date }}" ]; then
            AS_OF_FLAG="--as-of ${{ github.event.inputs.as_of_date }}"
          fi

          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          FRED_FLAG=""
          if [ "${{ github.event.inputs.skip_fred }}" = "true" ]; then
            FRED_FLAG="--skip-fred"
          fi

          python scripts/monthly_decision.py $AS_OF_FLAG $DRY_FLAG $FRED_FLAG

      - name: Commit results
        # Skip commit on dry-run; only commit if there are changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/monthly_decisions/
          git add data/pgr_financials.db
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m \
            "feat: monthly decision report $(date -u +%Y-%m) [skip ci]"
          git push

      - name: Send monthly decision email
        # Send after a successful (non-dry-run) report.  Failure is non-fatal —
        # data collection and DB commit are more critical than the notification.
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        env:
          SMTP_SERVER:   ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.PREDICTION_EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.PREDICTION_EMAIL_TO }}
        run: |
          python - <<'PYEOF'
          import os, re, smtplib, ssl, sys
          from datetime import datetime, timezone
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from pathlib import Path

          # Locate this month's report
          ym = datetime.now(timezone.utc).strftime("%Y-%m")
          report_path = Path(f"results/monthly_decisions/{ym}/recommendation.md")
          if not report_path.exists():
              print(f"[email] Report not found at {report_path}; skipping notification.")
              sys.exit(0)

          body = report_path.read_text(encoding="utf-8")

          # Extract signal from "| Signal | **NEUTRAL (LOW CONFIDENCE)** |"
          signal = "UNKNOWN"
          m = re.search(r"\| Signal \| \*\*(.+?)\*\* \|", body)
          if m:
              signal = m.group(1)

          month_label = datetime.now(timezone.utc).strftime("%B %Y")
          subject = f"PGR Monthly Decision \u2014 {month_label}: {signal}"

          # Validate required secrets are configured
          smtp_server = os.environ.get("SMTP_SERVER", "").strip()
          smtp_port   = int(os.environ.get("SMTP_PORT", "465") or "465")
          username    = os.environ.get("SMTP_USERNAME", "").strip()
          password    = os.environ.get("SMTP_PASSWORD", "").strip()
          from_addr   = os.environ.get("EMAIL_FROM", "").strip()
          to_addr     = os.environ.get("EMAIL_TO", "").strip()

          missing = [k for k, v in {
              "SMTP_SERVER": smtp_server, "SMTP_USERNAME": username,
              "SMTP_PASSWORD": password, "EMAIL_FROM": from_addr,
              "EMAIL_TO": to_addr,
          }.items() if not v]
          if missing:
              print(f"[email] Missing secrets: {missing}. Skipping notification.")
              sys.exit(0)

          # Build message
          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = from_addr
          msg["To"]      = to_addr
          msg.attach(MIMEText(body, "plain", "utf-8"))

          # Send — port 465 uses SMTP_SSL; port 587 uses STARTTLS
          try:
              if smtp_port == 465:
                  ctx = ssl.create_default_context()
                  with smtplib.SMTP_SSL(smtp_server, smtp_port, context=ctx) as s:
                      s.login(username, password)
                      s.sendmail(from_addr, [to_addr], msg.as_string())
              else:
                  with smtplib.SMTP(smtp_server, smtp_port) as s:
                      s.ehlo()
                      s.starttls(context=ssl.create_default_context())
                      s.login(username, password)
                      s.sendmail(from_addr, [to_addr], msg.as_string())
              print(f"[email] Sent: {subject}")
          except Exception as exc:
              print(f"[email] WARNING: Failed to send notification: {exc}")
              sys.exit(1)
          PYEOF
