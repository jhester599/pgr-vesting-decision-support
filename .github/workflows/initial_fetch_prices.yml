name: Initial Fetch — Day 1 (Prices)

# Scheduled for Wed 2026-03-25 at 10:00 AM ET (14:00 UTC).
# Originally 2026-03-23; rescheduled +1 day after AV rate-limit failure on first run.
# Rescheduled again +1 day (to 2026-03-25) after 403 git-push failure on 2026-03-24
# caused by missing permissions: contents: write — now fixed.
# workflow_dispatch lets you trigger it manually at any time (e.g. to test).
#
# AV budget: 22 calls (one per ticker: PGR + 21 ETFs incl. KIE added v4.5).
# Run this on Day 1; run initial_fetch_dividends.yml on Day 2 so the two
# fetches stay within the 25 calls/day free-tier limit.

on:
  schedule:
    # 10:00 AM ET = 14:00 UTC  |  date: Wed 2026-03-25
    - cron: '0 14 25 3 *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log actions, skip HTTP calls and DB writes'
        required: false
        default: 'false'
      force:
        description: 'Force re-fetch even if already run today'
        required: false
        default: 'false'

jobs:
  fetch-prices:
    name: Fetch full price history (22 AV calls)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for git push back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run initial price fetch
        id: fetch
        env:
          AV_API_KEY:   ${{ secrets.AV_API_KEY }}
          FMP_API_KEY:  ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DRY_FLAG=""
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/initial_fetch.py --prices --fred $DRY_FLAG $FORCE_FLAG \
            --status-file data/fetch_status.md

      - name: Commit database and status report
        # Skip commit for dry runs — nothing was written to disk
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pgr_financials.db data/fetch_status.md
          git diff --staged --quiet || git commit -m \
            "chore: initial fetch Day 1 — prices $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Verify row counts in DB
        # Quick sanity check: assert the DB has price rows for PGR and VTI.
        # Fails the job (and triggers a GitHub notification) if either is empty.
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python - <<'EOF'
          import sqlite3, sys
          conn = sqlite3.connect("data/pgr_financials.db")
          for ticker in ["PGR", "VTI", "KIE"]:
              n = conn.execute(
                  "SELECT COUNT(*) FROM daily_prices WHERE ticker=?", (ticker,)
              ).fetchone()[0]
              print(f"  {ticker}: {n} price rows")
              if n == 0:
                  print(f"ERROR: {ticker} has no price rows — fetch may have failed.")
                  sys.exit(1)
          print("Verification passed.")
          EOF
