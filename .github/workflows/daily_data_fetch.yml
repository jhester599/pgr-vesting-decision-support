name: Daily Data Accumulation

on:
  schedule:
    # 4:30 PM UTC weekdays = 11:30 AM ET (after US market data updates settle)
    - cron: '30 16 * * 1-5'
  workflow_dispatch:
    # Manual trigger for backfill runs or debugging
    inputs:
      dry_run:
        description: 'Dry run (log actions, skip HTTP calls)'
        required: false
        default: 'false'
      override_date:
        description: 'Override date for scheduler parity (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  fetch:
    name: Fetch market data
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily fetch
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          DRY_FLAG=""
          DATE_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          if [ -n "${{ github.event.inputs.override_date }}" ]; then
            DATE_FLAG="--date ${{ github.event.inputs.override_date }}"
          fi
          python scripts/daily_fetch.py $DRY_FLAG $DATE_FLAG

      - name: Commit updated database
        # Only commit if the DB file actually changed (skip for dry-run)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pgr_financials.db
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m \
            "chore: daily data update $(date -u +%Y-%m-%d) [skip ci]"
          git push
