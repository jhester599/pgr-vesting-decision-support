name: Peer Weekly Data Fetch (ALL, TRV, CB, HIG)

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - log actions, skip HTTP calls and DB writes'
        required: false
        default: 'false'

concurrency:
  group: peer-weekly-data-fetch
  cancel-in-progress: false

jobs:
  peer-fetch:
    name: Fetch peer weekly data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run peer fetch
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/peer_fetch.py $DRY_FLAG

      - name: Verify peer rows and write summary
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          python - <<'PY'
          import sqlite3

          conn = sqlite3.connect("data/pgr_financials.db")
          peers = ["ALL", "TRV", "CB", "HIG"]
          lines = ["## Peer Weekly Data Fetch", ""]
          for ticker in peers:
              n_prices = conn.execute(
                  "SELECT COUNT(*) FROM daily_prices WHERE ticker=?", (ticker,)
              ).fetchone()[0]
              latest_price = conn.execute(
                  "SELECT MAX(date) FROM daily_prices WHERE ticker=?", (ticker,)
              ).fetchone()[0]
              n_divs = conn.execute(
                  "SELECT COUNT(*) FROM daily_dividends WHERE ticker=?", (ticker,)
              ).fetchone()[0]
              if n_prices == 0:
                  raise SystemExit(f"{ticker} has no price rows after peer fetch.")
              lines.append(
                  f"- {ticker}: `{n_prices}` prices, `{n_divs}` dividends, latest price `{latest_price}`"
              )
          with open("workflow_summary.md", "w", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
          conn.close()
          PY
          cat workflow_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated database
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pgr_financials.db
          git diff --staged --quiet || git commit -m "chore: peer data update $(date -u +%Y-%m-%d) [skip ci]"
          git push
