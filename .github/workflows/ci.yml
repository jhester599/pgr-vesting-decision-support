name: CI

on:
  push:
    branches:
      - master
      - codex/**
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install runtime and dev dependencies
        run: pip install -r requirements-dev.txt -c constraints-dev.txt

      - name: Ruff syntax and fatal-lint pass
        run: ruff check .

      - name: Limited mypy pass on hardened modules
        run: python -m mypy src/database/migration_runner.py src/ingestion/provider_registry.py src/reporting/run_manifest.py

      - name: Run unit and integration tests
        run: python -m pytest -q

      - name: Smoke test production entrypoints
        run: |
          python scripts/weekly_fetch.py --dry-run --skip-fred
          python scripts/peer_fetch.py --dry-run
          python scripts/edgar_8k_fetcher.py --dry-run
          python scripts/monthly_decision.py --as-of 2026-04-02 --dry-run --skip-fred
