name: Monthly 8-K Fetch (PGR Operating Metrics)

on:
  schedule:
    - cron: '0 14 20 * *'
    - cron: '0 14 25 * *'
  workflow_dispatch:
    inputs:
      backfill_years:
        description: 'Years to backfill (default: 2; use 15 for full history)'
        required: false
        default: '2'
      dry_run:
        description: 'Dry run - parse filings but skip DB write'
        required: false
        default: 'false'

concurrency:
  group: monthly-8k-fetch
  cancel-in-progress: false

jobs:
  fetch_8k:
    name: Fetch PGR monthly 8-K data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch PGR 8-K operating metrics
        run: |
          BACKFILL="${{ github.event.inputs.backfill_years || '2' }}"
          DRY_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/edgar_8k_fetcher.py --backfill-years "$BACKFILL" $DRY_FLAG

      - name: Verify EDGAR latest row and write summary
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          python - <<'PY'
          from datetime import date

          import config
          from src.database import db_client

          conn = db_client.get_connection(config.DB_PATH)
          row = conn.execute(
              """
              SELECT COUNT(*), MAX(month_end), MAX(filing_date)
              FROM pgr_edgar_monthly
              """
          ).fetchone()
          row_count, latest_month, latest_filing = row
          if row_count == 0:
              raise SystemExit("pgr_edgar_monthly is empty after monthly 8-K fetch.")
          freshness = db_client.check_data_freshness(conn, date.today())
          edgar_row = next(
              item for item in freshness["checks"]
              if item["feed"] == "PGR monthly EDGAR"
          )
          if edgar_row["status"] != "OK":
              raise SystemExit(
                  "PGR monthly EDGAR freshness failed after monthly 8-K fetch: "
                  + "; ".join(freshness["warnings"])
              )
          summary = [
              "## Monthly 8-K Fetch",
              "",
              f"- pgr_edgar_monthly rows: `{row_count}`",
              f"- Latest month_end: `{latest_month}`",
              f"- Latest filing_date: `{latest_filing}`",
              f"- Expected month_end: `{edgar_row.get('expected_month_end')}`",
              f"- Freshness rule: `{edgar_row.get('limit_label')}`",
              f"- Freshness status: `{edgar_row['status']}`",
          ]
          with open("workflow_summary.md", "w", encoding="utf-8") as fh:
              fh.write("\n".join(summary) + "\n")
          conn.close()
          PY
          cat workflow_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated database
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pgr_financials.db
          git diff --staged --quiet || git commit -m "chore: 8-K monthly fetch $(date -u +%Y-%m-%d) [skip ci]"
          git push
