name: Weekly Data Accumulation

on:
  schedule:
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log actions, skip HTTP calls)'
        required: false
        default: 'false'

concurrency:
  group: weekly-data-accumulation
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch weekly market data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly fetch
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/weekly_fetch.py $DRY_FLAG

      - name: Verify DB postconditions and write summary
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          python - <<'PY'
          import config
          from src.database import db_client

          conn = db_client.get_connection(config.DB_PATH)
          snapshot = db_client.get_operational_snapshot(conn)
          latest_prices = snapshot["latest_dates"]["daily_prices.date"]
          latest_targets = snapshot["latest_dates"]["monthly_relative_returns.date"]
          if snapshot["row_counts"]["daily_prices"] == 0:
              raise SystemExit("daily_prices is empty after weekly fetch.")
          if latest_prices is None:
              raise SystemExit("daily_prices latest date is missing after weekly fetch.")
          summary = [
              "## Weekly Data Accumulation",
              "",
              f"- Schema version: `{snapshot['schema_version']}`",
              f"- daily_prices rows: `{snapshot['row_counts']['daily_prices']}`",
              f"- daily_dividends rows: `{snapshot['row_counts']['daily_dividends']}`",
              f"- monthly_relative_returns rows: `{snapshot['row_counts']['monthly_relative_returns']}`",
              f"- Latest price date: `{latest_prices}`",
              f"- Latest relative-return date: `{latest_targets}`",
          ]
          with open("workflow_summary.md", "w", encoding="utf-8") as fh:
              fh.write("\n".join(summary) + "\n")
          conn.close()
          PY
          cat workflow_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated database
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pgr_financials.db
          git diff --staged --quiet || git commit -m "chore: weekly data update $(date -u +%Y-%m-%d) [skip ci]"
          git push
